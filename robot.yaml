serial_number: a200-0000
version: 0
system:
  hosts:
    - hostname: cpr-a200-0000
      ip: 192.168.131.1
  ros2:
    namespace: a200_0000
  uri: cpr-a200-0000
  initial_pose:
    position:
      x: 0.0
      y: 0.0
      z: 0.0
    orientation:
      roll: 0.0
      pitch: 0.0
      yaw: 1.5708
platform:
  attachments:
    - name: front_bumper
      type: a200.bumper
      parent: front_bumper_mount
    - name: rear_bumper
      type: a200.bumper
      parent: rear_bumper_mount
    - name: top_plate
      type: a200.top_plate
manipulators:
  arms:
    - model: universal_robots
      parent: default_mount
      xyz: [0.15, 0.0, 0.0]
      rpy: [0.0, 0.0, 0.0]
      ur_type: ur5e
      robbot_ip: 192.168.131.40
      headless_mode: false
      kinematics_parameters_file: "$(find ur_description)/config/ur5e/default_kinematics.yaml"
      poses:
        - name: home
          joints: [4.0, -1.2, 1.0, -1.4, -1.57, 0.0]
      gripper:
        model: robotiq_2f_85
        parent: tool0
        xyz: [0.0, 0.0, 0.0]
        rpy: [0.0, 0.0, 0.0]
sensors:
  camera:
    - model: intel_realsense
      urdf_enabled: true
      launch_enabled: true
      parent: arm_0_wrist_3_link
      xyz: [0.0, 0.1, 0.0]
      rpy: [0.0, -1.5708, 1.5708]
      ros_parameters:
        intel_realsense:
          camera_name: wrist_camera
          device_type: d435
          serial_no: "0"
          enable_color: true
          rgb_camera.profile: 640,480,30
          enable_depth: true
          depth_module.profile: 640,480,30
          pointcloud.enable: true
  lidar2d:
    - model: sick_lms1xx
      urdf_enabled: true
      launch_enabled: true
      parent: base_link
      xyz: [0.3, 0.0, 0.2]
      rpy: [0.0, 0.0, 0.0]